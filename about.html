<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT — CAMILLE ROUSSEL</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">

    <style>
        /* Déclaration de ta police locale Coconat au format WOFF2 */
        @font-face {
            font-family: 'Coconat';
            src: url('Coconat-Regular.woff2') format('woff2'); 
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        /* Styles Globaux */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #FAF6F0; /* Fond crème */
            color: rgb(43, 31, 29); /* Couleur exacte RVB 43, 31, 29 */
            font-family: 'Coconat', serif;
            /* Padding : Haut (40px), Droite (60px), Bas (30px), Gauche (60px) */
            padding: 40px 60px 30px 60px; 
            display: flex;
            flex-direction: column;
            gap: 60px;
            text-transform: uppercase; /* Force le reste du site en majuscules */
        }

        /* Liens généraux */
        a {
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s ease;
        }

        a:hover {
            opacity: 0.6;
        }

        .underline {
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        /* Classes de typographies */
        .typo-coconat {
            font-family: 'Coconat', serif;
            font-weight: 400 !important;
        }

        .typo-outfit {
            font-family: 'Outfit', sans-serif;
            font-weight: 600 !important;
        }

        .typo-outfit-light {
            font-family: 'Outfit', sans-serif;
            font-weight: 300 !important;
            text-transform: none; /* Bas de casse */
        }

        /* Barre de navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        nav ul li a {
            font-size: 0.85rem;
            letter-spacing: 1.5px;
        }

        /* --- GRILLE PRINCIPALE DE PROFIL (4 colonnes) --- */
        .profile-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 50px 30px;
            align-items: flex-start;
            margin-top: 20px;
        }

        /* Rectangle marron de 445x530px calé sur la fin de la colonne 2 */
        .profile-image-container {
            grid-column: 1 / 3; 
            justify-self: end; 
            width: 445px;
            height: 530px;
            max-width: 100%; 
            background-color: rgb(43, 31, 29); 
            overflow: hidden;
        }

        .profile-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* bloc texte configuré avec un espace strict de 200px depuis le rectangle */
        .profile-text {
            grid-column: 3 / 5; 
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-left: 170px; /* 170px + 30px (gap de la grille) = 200px pile d'espace */
        }

        .profile-text h1 {
            font-size: 3.5rem;
            font-weight: normal;
        }

        .profile-text p {
            font-size: 1.15rem;
            line-height: 1.5;
            text-transform: none; /* Bas de casse */
        }

        /* --- GRILLE DES PARCOURS (4 colonnes) --- */
        .resume-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 50px 30px;
            border-top: 1px solid rgb(43, 31, 29);
            padding-top: 40px;
            padding-bottom: 20px;
        }

            border-bottom: 1px solid rgb(43, 31, 29);
